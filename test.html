<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>考试复习系统</title>
<style>
/* 全局样式重置 */
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
body{background:#f5f7fa;padding:10px;font-size:14px;color:#333}
.container{background:#fff;border-radius:8px;padding:15px}

/* 模式切换按钮 */
.mode-switch{display:flex;justify-content:center;gap:8px;margin-bottom:15px}
.mode-btn{padding:6px 14px;border:none;border-radius:20px;background:#e0e6ed;color:#4a5568}
.mode-btn.active{background:#3182ce;color:#fff}

/* 进度统计栏 */
.progress-info{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px}

/* 滑块导航 */
.slider-container{display:flex;align-items:center;gap:10px;margin-bottom:15px}
.nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid #cbd5e0;background:#fff}
.question-slider{flex:1;height:4px;background:#edf2f7}
.question-slider::-webkit-slider-thumb{width:16px;height:16px;border-radius:50%;background:#3182ce}

/* 题目卡片 */
.question-card{border:1px solid #e2e8f0;border-radius:6px;padding:15px}
.question-category{display:inline-block;background:#ebf8ff;color:#3182ce;padding:3px 8px;font-size:11px;border-radius:3px;margin-bottom:8px}
.question-note{font-size:11px;color:#e53e3e;background:#fff5f5;padding:5px 8px;border-radius:3px;display:none}

/* 选项样式 */
.options-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.option-item{padding:12px;border:1.5px solid #e2e8f0;border-radius:6px;display:flex;align-items:flex-start;gap:10px}
.option-item.selected{background:#ebf8ff;border-color:#3182ce} /* 选中高亮 */
.option-item.correct{background:#d4f8e8;border-color:#38a169;font-weight:bold} /* 正确答案高亮 */
.option-letter{min-width:20px;height:20px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px}

/* 提交按钮 */
.submit-btn{width:100%;padding:10px;border:none;border-radius:6px;background:#3182ce;color:#fff;margin-top:10px}

/* 结果弹窗 */
.feedback-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden}
.feedback-modal.active{opacity:1;visibility:visible}
.feedback-content{background:#fff;border-radius:10px;padding:20px;width:90%;max-width:350px;text-align:center}
.feedback-buttons{display:flex;gap:10px;margin-top:15px}
.feedback-btn{flex:1;padding:9px;border:none;border-radius:6px}
.next-btn{background:#3182ce;color:#fff}
.review-btn{background:#e2e8f0}

/* 正确错误图标 */
        .feedback-icon {
            font-size: 36px;
            margin-bottom: 15px;
        }
        
        .feedback-icon.correct {
            color: #38a169;
        }
        
        .feedback-icon.incorrect {
            color: #e53e3e;
        }
</style>
</head>
<body>

<div class="container">
    <!-- 模式切换 -->
    <div class="mode-switch">
        <button class="mode-btn active" id="test">测试模式</button>
        <button class="mode-btn" id="review">复习模式</button>
    </div>

    <!-- 题目统计 -->
    <div class="progress-info">
        <div>第 <span id="current">1</span> 道 / 共 <span id="total">0</span> 道</div>
        <div>已答：<span id="answered">0</span> | 正确率：<span id="rate">0%</span></div>
    </div>

    <!-- 上下题滑块 -->
    <div class="slider-container">
        <button class="nav-btn" id="prev" disabled>&lt;</button>
        <input type="range" min="1" max="1" value="1" class="question-slider" id="slider">
        <button class="nav-btn" id="next">&gt;</button>
    </div>

    <!-- 题目内容区 -->
    <div class="question-card">
        <div class="question-category" id="cate">分类</div>
        <div style="margin:10px 0" id="text">加载中...</div>
        <div class="question-note" id="note"></div>
        <div class="options-list" id="options"></div>
        <button class="submit-btn" id="submit" disabled>确认答案</button>
    </div>
</div>

<!-- 答题结果弹窗 -->
<div class="feedback-modal" id="modal">
    <div class="feedback-content">
        <div id="icon" style="font-size:30px"></div>
        <div id="title" style="font-weight:bold;margin:10px 0"></div>
        <div id="msg"></div>
        <div id="correct" style="background:#f7fafc;padding:8px;border-radius:6px;margin:10px 0"></div>
        <div class="feedback-buttons">
            <button class="feedback-btn next-btn" id="nextq">下一题</button>
            <button class="feedback-btn review-btn" id="reviewq">我再看看</button>
        </div>
    </div>
</div>

// ======================================
// 二、全局状态（程序运行数据）
// ======================================
let app = {
    mode: "test",           // 当前模式：test测试 / review复习
    idx: 0,                  // 当前题目索引
    selected: [],            // 测试模式下选中的答案（多选数组）
    answered: Array(questionBank.length).fill(null) // 答题记录：true正确/false错误/null未答
};

// 快捷获取DOM元素
const $ = id => document.getElementById(id);

// ======================================
// 三、初始化函数（页面加载完成执行）
// ======================================
function init() {
    $("total").textContent = questionBank.length; // 总题数
    $("slider").max = questionBank.length;        // 滑块最大值
    bindEvents();    // 绑定所有按钮事件
    loadQuestion(app.idx); // 加载第一题
    updateStats();   // 初始化统计
}

// ======================================
// 四、绑定所有交互事件
// ======================================
function bindEvents() {
    $("test").onclick = () => switchMode("test");    // 切换测试模式
    $("review").onclick = () => switchMode("review"); // 切换复习模式
    $("prev").onclick = () => goQuestion(-1);         // 上一题
    $("next").onclick = () => goQuestion(1);          // 下一题
    $("submit").onclick = checkAnswer;                // 提交答案
    $("nextq").onclick = () => { $("modal").classList.remove("active"); goQuestion(1); }; // 弹窗下一题
    $("reviewq").onclick = () => { $("modal").classList.remove("active"); }; // 关闭弹窗
    $("slider").oninput = () => { app.idx = $("slider").value - 1; loadQuestion(app.idx); }; // 滑块切题
}

// ======================================
// 五、切换测试/复习模式
// ======================================
function switchMode(m) {
    app.mode = m;
    app.selected = []; // 清空选中
    // 按钮高亮
    $("test").classList.toggle("active", m == "test");
    $("review").classList.toggle("active", m == "review");
    // 测试模式显示提交，复习模式隐藏
    $("submit").style.display = m == "test" ? "block" : "none";
    loadQuestion(app.idx); // 重新加载题目
}

// ======================================
// 六、加载指定索引的题目
// ======================================
function loadQuestion(idx) {
    if (!questionBank.length) return;
    app.idx = idx;
    app.selected = []; // 清空选中

    const q = questionBank[idx];
    $("current").textContent = idx + 1;
    $("slider").value = idx + 1;
    $("cate").textContent = q.category || "未分类";
    $("text").textContent = q.question;
    // 显示备注
    q.note ? ($("note").style.display = "block", $("note").textContent = q.note) : $("note").style.display = "none";
    
    renderOptions(q.options, q.answer); // 渲染选项
    
    // 上下题按钮禁用逻辑
    $("prev").disabled = idx <= 0;
    $("next").disabled = idx >= questionBank.length - 1;
    $("submit").disabled = true; // 提交按钮默认禁用
}

// ======================================
// 七、渲染选项（支持单选/多选/复习高亮）
// ======================================
function renderOptions(opts, ans) {
    const box = $("options");
    box.innerHTML = "";
    const keys = ["A", "B", "C", "D", "E"];

    keys.forEach(k => {
        if (!opts.hasOwnProperty(k)) return;
        const div = document.createElement("div");
        div.className = "option-item";
        div.dataset.k = k;

        const isCorrect = String(ans).includes(k);
        // 复习模式：正确答案高亮绿色
        if (app.mode === "review" && isCorrect) div.classList.add("correct");

        // 拼接选项HTML
        div.innerHTML = `
            <span class="option-letter">${k}</span>
            <span>${opts[k]}</span>
            ${app.mode == "review" && isCorrect ? '<span style="margin-left:auto;color:green">✓</span>' : ''}
        `;

        // 测试模式：点击选中/取消
        if (app.mode === "test") {
            div.onclick = () => {
                const q = questionBank[app.idx];
                // 单选处理
                if (q.type === "单选") app.selected = [k];
                // 多选处理：点击加入/再次点击移除
                if (q.type === "多选") {
                    app.selected.includes(k) 
                        ? app.selected = app.selected.filter(x => x !== k) 
                        : app.selected.push(k);
                }
                // 高亮所有选中项
                document.querySelectorAll(".option-item").forEach(i => i.classList.remove("selected"));
                app.selected.forEach(x => document.querySelector(`.option-item[data-k="${x}"]`).classList.add("selected"));
                // 有选中则启用提交
                $("submit").disabled = app.selected.length === 0;
            };
        }
        box.appendChild(div);
    });
}

// ======================================
// 八、提交并核对答案
// ======================================
function checkAnswer() {
    const q = questionBank[app.idx];
    // 用户答案排序后转字符串
    const userAns = app.selected.sort().join("");
    // 正确答案排序后转字符串
    const realAns = String(q.answer).split("").sort().join("");
    // 是否正确
    const isRight = userAns === realAns;

    // 保存答题结果
    app.answered[app.idx] = isRight;
    // 更新右上角统计
    updateStats();

    // 弹窗显示结果
    $("icon").className = isRight ? 'feedback-icon correct' : 'feedback-icon incorrect';
    $("icon").textContent = isRight ? "✓" : "✗";
    //$("title").textContent = isRight ? "回答正确" : "回答错误";
    $("msg").className = isRight ? 'feedback-icon correct' : 'feedback-icon incorrect';
    $("msg").textContent = isRight ? getRandomEncouragement()  : "仔细看看正确答案";
    $("correct").textContent = `正确答案：${q.answer}`;
    $("modal").classList.add("active");
}

// ======================================
// 九、题目切换（上一题/下一题）
// ======================================
function goQuestion(direction) {
    const newIdx = app.idx + direction;
    if (newIdx < 0 || newIdx >= questionBank.length) return;
    loadQuestion(newIdx);
}

// ======================================
// 十、【修复】更新统计：已答题数、正确率
// ======================================
function updateStats() {
    // 已答数量：不为null的数量
    const answeredCount = app.answered.filter(item => item !== null).length;
    // 正确数量：为true的数量
    const rightCount = app.answered.filter(item => item === true).length;
    // 正确率：避免除以0
    const rate = answeredCount === 0 ? 0 : Math.round((rightCount / answeredCount) * 100);

    // 更新页面显示
    $("answered").textContent = answeredCount;
    $("rate").textContent = rate + "%";
}

// ======================================
// 启动程序
// ======================================
init();
